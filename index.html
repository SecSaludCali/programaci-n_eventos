<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Programación - Subsecretaría de Promoción, Prevención y Producción Social de la Salud</title>

    <!-- Tailwind CSS para diseño moderno -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>

    <!-- FullCalendar -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>

    <!-- SweetAlert2 para notificaciones y pop-ups bonitos -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* Ajustes UI para el calendario y los eventos */
        .fc-theme-standard th {
            padding: 8px 0;
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .fc .fc-button-primary {
            background-color: #4f46e5 !important;
            border-color: #4f46e5 !important;
            font-weight: 600;
            text-transform: capitalize;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .fc .fc-button-primary:hover {
            background-color: #4338ca !important;
            border-color: #4338ca !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .fc .fc-toolbar-title {
            font-size: 1.25rem !important; /* Ligeramente más pequeño para móviles */
            font-weight: 800;
            color: #1e293b;
            text-transform: capitalize;
        }
        
        @media (min-width: 1024px) {
            .fc .fc-toolbar-title { font-size: 1.5rem !important; }
        }

        /* Responsive toolbar for fullcalendar on small screens */
        @media (max-width: 640px) {
            .fc-toolbar.fc-header-toolbar {
                flex-direction: column;
                gap: 0.75rem;
            }
        }

        /* Eliminar bordes por defecto de FullCalendar para usar los de Tailwind */
        .fc-event {
            border: none !important;
            background: transparent !important;
        }

        .fc-daygrid-event-harness {
            margin-bottom: 4px !important;
            margin-left: 2px !important;
            margin-right: 2px !important;
        }

        /* Animación suave para los cuadritos del calendario */
        .evento-personalizado {
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .evento-personalizado:hover {
            transform: scale(1.03);
            z-index: 10;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* SweetAlert Custom UI */
        .swal2-popup {
            border-radius: 1.25rem !important;
            width: 95% !important;
            max-width: 36rem !important;
        }

        .swal2-html-container {
            margin: 1em 0 0.3em !important;
        }

        /* Input de mes personalizado */
        input[type="month"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(41%) sepia(87%) saturate(2250%) hue-rotate(226deg) brightness(97%) contrast(93%);
        }
    </style>
</head>

<body
    class="bg-slate-50 text-slate-800 font-sans selection:bg-indigo-100 selection:text-indigo-900 flex flex-col min-h-screen lg:h-screen lg:overflow-hidden">

    <!-- Navbar superior -->
    <header
        class="bg-gradient-to-r from-indigo-700 to-indigo-600 text-white shadow-lg py-3 px-4 sm:px-6 flex justify-between items-center z-20 shrink-0">
        <div class="flex items-center gap-2 sm:gap-3">
            <div class="bg-white/20 p-1.5 sm:p-2 rounded-lg backdrop-blur-sm hidden sm:block">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                    </path>
                </svg>
            </div>
            <div>
                <h1 class="text-sm sm:text-xl font-bold tracking-tight leading-tight">Subsecretaría de Promoción, Prevención y Producción Social
                    de la Salud</h1>
                <p class="text-[10px] sm:text-xs text-indigo-100 font-medium opacity-80 mt-0.5">Formulario de Programación</p>
            </div>
        </div>
        <div
            class="flex items-center gap-1.5 text-xs sm:text-sm bg-white/10 border border-white/20 py-1 px-3 sm:py-1.5 sm:px-4 rounded-full font-medium shadow-inner backdrop-blur-sm shrink-0">
            <span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-green-400 animate-pulse"></span>
            <span class="hidden sm:inline">En línea</span>
        </div>
    </header>

    <!-- Contenedor Principal (Flexible para móvil, Grid/Flex estático para PC) -->
    <div class="flex flex-col lg:flex-row flex-1 overflow-hidden h-full">

        <!-- PANEL IZQUIERDO: FORMULARIO -->
        <div
            class="w-full lg:w-1/3 lg:max-w-md bg-white border-b lg:border-b-0 lg:border-r border-slate-200 shadow-[4px_0_24px_rgba(0,0,0,0.02)] lg:overflow-y-auto z-10 shrink-0">
            <div class="p-4 sm:p-6">

                <div class="mb-5 pb-4 border-b border-slate-100 flex flex-col sm:flex-row sm:justify-between sm:items-start gap-3">
                    <div>
                        <h2 id="form-title" class="text-xl sm:text-2xl font-extrabold text-slate-800 tracking-tight">Nueva
                            Actividad</h2>
                        <p id="form-subtitle" class="text-xs sm:text-sm text-slate-500 mt-1">Programa los detalles del evento.</p>
                    </div>
                    <button id="btn-cancelar" type="button"
                        class="hidden flex items-center justify-center gap-1 text-xs text-red-600 hover:text-red-800 font-bold bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-md transition-colors w-full sm:w-auto"
                        onclick="resetForm()">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                        Cancelar Edición
                    </button>
                </div>

                <form id="eventoForm" class="space-y-4 sm:space-y-5">

                    <!-- CAMPOS OCULTOS PARA EDICIÓN -->
                    <input type="hidden" id="action" name="action" value="create">
                    <input type="hidden" id="row" name="row" value="">
                    <input type="hidden" id="id" name="id" value="">

                    <!-- GRUPO Y SUBGRUPO (Movidos al principio) -->
                    <div class="bg-indigo-50/50 p-3 sm:p-4 rounded-xl border border-indigo-100/50 space-y-3 sm:space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-indigo-900 uppercase tracking-wider mb-1">Grupo
                                Estratégico</label>
                            <select id="grupo" name="grupo" required onchange="evaluarGrupo()"
                                class="block w-full rounded-lg border-indigo-200 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm font-medium text-indigo-900 transition-colors">
                                <option value="">-- Seleccione --</option>
                                <option value="Salud Pública">Salud Pública</option>
                                <option value="Ambiente y Salud">Ambiente y Salud</option>
                                <option value="Vigilancia">Vigilancia</option>
                                <option value="Regulación Sanitaria">Regulación Sanitaria</option>
                            </select>
                        </div>

                        <div id="div-subgrupo" class="hidden">
                            <label class="block text-xs font-bold text-indigo-900 uppercase tracking-wider mb-1">Línea
                                de Acción</label>
                            <select id="subgrupo" name="subgrupo"
                                class="block w-full rounded-lg border-indigo-200 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm text-indigo-800 transition-colors">
                                <!-- Opciones dinámicas -->
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                        <div class="col-span-1 sm:col-span-2">
                            <label
                                class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Dirección</label>
                            <input type="text" id="direccion" name="direccion" required
                                class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm bg-slate-50 transition-colors"
                                placeholder="Ej: Carrera 15 # 10-20">
                        </div>
                        <div class="col-span-1 sm:col-span-2">
                            <label
                                class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Barrio</label>
                            <input type="text" id="barrio" name="barrio" required
                                class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm transition-colors"
                                placeholder="Ej: San Antonio">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Comuna o
                            Corregimiento</label>
                        <select id="comuna" name="comuna" required
                            class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm font-medium text-slate-700 transition-colors">
                            <option value="">-- Seleccione --</option>
                            <optgroup label="Comunas Urbanas" id="optgroup-comunas"></optgroup>
                            <optgroup label="Corregimientos Rurales">
                                <option value="Corregimiento Pance">Pance</option>
                                <option value="Corregimiento Pichindé">Pichindé</option>
                                <option value="Corregimiento Los Andes">Los Andes</option>
                                <option value="Corregimiento Villacarmelo">Villacarmelo</option>
                                <option value="Corregimiento La Leonera">La Leonera</option>
                                <option value="Corregimiento El Saladito">El Saladito</option>
                                <option value="Corregimiento Felidia">Felidia</option>
                                <option value="Corregimiento Montebello">Montebello</option>
                                <option value="Corregimiento Golondrinas">Golondrinas</option>
                                <option value="Corregimiento La Elvira">La Elvira</option>
                                <option value="Corregimiento La Paz">La Paz</option>
                                <option value="Corregimiento Navarro">Navarro</option>
                                <option value="Corregimiento Hormiguero">Hormiguero</option>
                                <option value="Corregimiento La Buitrera">La Buitrera</option>
                            </optgroup>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Población
                            Objeto</label>
                        <input type="text" id="poblacion" name="poblacion" required
                            class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm transition-colors"
                            placeholder="Ej: Adultos mayores, Niños...">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Servicios
                            Ofertados</label>
                        <textarea id="servicios" name="servicios" rows="2" required
                            class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm transition-colors"
                            placeholder="Describa los servicios a prestar..."></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Articulación
                            requerida</label>
                        <input type="text" id="articulacion" name="articulacion"
                            class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm transition-colors"
                            placeholder="¿Con qué organismos? (Opcional)">
                    </div>

                    <div class="grid grid-cols-1 gap-3 sm:gap-4">
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-200">
                            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Fecha y
                                Hora</label>
                            <input type="datetime-local" id="horario" name="horario" required
                                class="block w-full border-none shadow-inner rounded-md focus:ring-indigo-500 text-sm font-bold text-indigo-700 bg-white">
                        </div>
                        <div>
                            <label
                                class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Responsable</label>
                            <input type="text" id="responsable" name="responsable" required
                                class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm transition-colors">
                        </div>
                    </div>

                    <div class="pt-3 pb-6 flex flex-col gap-2">
                        <button type="submit" id="btn-submit"
                            class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 hover:shadow-[0_6px_20px_rgba(79,70,229,0.23)] hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-200">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4">
                                </path>
                            </svg>
                            Registrar Programación
                        </button>
                        
                        <!-- BOTÓN ELIMINAR (Solo visible en modo edición) -->
                        <button type="button" id="btn-delete" class="hidden w-full flex justify-center items-center gap-2 py-2.5 px-4 rounded-xl text-sm font-bold text-red-600 bg-red-50 hover:bg-red-100 hover:text-red-700 transition-colors border border-red-100" onclick="confirmarEliminar()">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            Eliminar Evento
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- PANEL DERECHO: CALENDARIO -->
        <div class="w-full lg:w-2/3 lg:flex-1 bg-slate-100/50 p-3 sm:p-4 lg:p-6 lg:overflow-y-auto flex flex-col min-h-[600px] lg:min-h-0">

            <!-- CONTROLES SUPERIORES DEL CALENDARIO (Buscador de mes) -->
            <div class="flex justify-between sm:justify-end items-center mb-3">
                <div
                    class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl border border-slate-200 shadow-sm transition-all hover:shadow-md w-full sm:w-auto justify-between sm:justify-start">
                    <label for="mesNavegador"
                        class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Saltar a
                        mes:</label>
                    <input type="month" id="mesNavegador"
                        class="border-none bg-transparent focus:ring-0 text-sm font-bold text-indigo-700 cursor-pointer p-0 h-auto w-auto">
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-3 sm:p-4 flex-grow relative flex flex-col h-full">
                <!-- Wrapper extra para que FC respete alturas en pantallas móviles -->
                <div class="flex-grow w-full relative">
                    <div id='calendar' class="absolute inset-0 h-full w-full"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // URL DE TU SCRIPT DE GOOGLE SHEETS
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwGU6MbzB9kgd1RbAWs3L4p1qyT70uIbrT_uejylOQC-znJggMn_--ooVzx_JdNgxfC/exec';

        let calendar;

        // CACHÉ DE DATOS (Para que la navegación sea instantánea)
        let eventosCacheados = null;
        let festivosCacheados = {};

        // --- LÓGICA CONDICIONAL DE GRUPOS ---
        function evaluarGrupo() {
            const valor = document.getElementById('grupo').value;
            const subgrupoActual = document.getElementById('subgrupo').value;
            const divSubgrupo = document.getElementById('div-subgrupo');
            const selectSubgrupo = document.getElementById('subgrupo');

            selectSubgrupo.innerHTML = '';

            if (valor === 'Salud Pública') {
                divSubgrupo.classList.remove('hidden'); selectSubgrupo.required = true;
                agregarOption(selectSubgrupo, 'Cultura para el cuidado y la vida');
                agregarOption(selectSubgrupo, 'Gestión del riesgo');
                agregarOption(selectSubgrupo, 'Gestión territorial integral');
            } else if (valor === 'Ambiente y Salud') {
                divSubgrupo.classList.remove('hidden'); selectSubgrupo.required = true;
                agregarOption(selectSubgrupo, 'ETV y zoonosis');
                agregarOption(selectSubgrupo, 'Gestión integral de entornos para la vida');
                agregarOption(selectSubgrupo, 'Calentamiento global');
            } else {
                // Aplica para Vigilancia y Regulación Sanitaria
                divSubgrupo.classList.add('hidden'); selectSubgrupo.required = false;
                agregarOption(selectSubgrupo, 'N/A');
            }
            if (subgrupoActual) selectSubgrupo.value = subgrupoActual;
        }

        function agregarOption(select, texto) {
            let opt = document.createElement('option');
            opt.value = texto; opt.textContent = texto; select.appendChild(opt);
        }

        // --- MODO EDICIÓN Y ELIMINACIÓN ---
        function resetForm() {
            document.getElementById('eventoForm').reset();
            document.getElementById('action').value = 'create';
            document.getElementById('row').value = '';
            document.getElementById('id').value = '';

            document.getElementById('form-title').textContent = 'Nueva Actividad';
            document.getElementById('form-title').classList.replace('text-amber-600', 'text-slate-800');
            document.getElementById('form-subtitle').textContent = 'Programa los detalles del evento.';

            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.innerHTML = `<svg class="w-5 h-5 inline-block mr-1 -mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg> Registrar Programación`;
            btnSubmit.className = "w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 hover:shadow-[0_6px_20px_rgba(79,70,229,0.23)] hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-200";

            document.getElementById('btn-cancelar').classList.add('hidden');
            document.getElementById('btn-delete').classList.add('hidden'); // Ocultar botón eliminar
            evaluarGrupo();
        }

        function cargarEventoEnFormulario(event) {
            const props = event.extendedProps;

            document.getElementById('action').value = 'update';
            document.getElementById('id').value = event.id;
            document.getElementById('row').value = props.row;

            // Para mantener compatibilidad por si en el excel dice "Regulación y Control"
            let valorGrupo = props.grupo;
            if (valorGrupo === 'Regulación y Control') valorGrupo = 'Regulación Sanitaria';
            document.getElementById('grupo').value = valorGrupo || '';

            evaluarGrupo();
            setTimeout(() => { document.getElementById('subgrupo').value = props.subgrupo || 'N/A'; }, 50);

            document.getElementById('comuna').value = props.comuna || '';
            document.getElementById('barrio').value = props.barrio || '';
            document.getElementById('direccion').value = props.direccion || '';
            document.getElementById('poblacion').value = props.poblacion || '';
            document.getElementById('servicios').value = props.servicios || '';
            document.getElementById('articulacion').value = props.articulacion || '';

            if (props.horario) {
                const dateObj = new Date(props.horario);
                dateObj.setMinutes(dateObj.getMinutes() - dateObj.getTimezoneOffset());
                document.getElementById('horario').value = dateObj.toISOString().slice(0, 16);
            }

            document.getElementById('responsable').value = props.responsable || '';

            // Diseño Modo Edición
            document.getElementById('form-title').textContent = 'Editar Actividad';
            document.getElementById('form-title').classList.replace('text-slate-800', 'text-amber-600');
            document.getElementById('form-subtitle').textContent = 'Modificando un registro existente.';

            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.innerHTML = `<svg class="w-5 h-5 inline-block mr-1 -mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Actualizar Cambios`;
            btnSubmit.className = "w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-[0_4px_14px_0_rgba(245,158,11,0.39)] text-sm font-bold text-white bg-amber-500 hover:bg-amber-600 hover:shadow-[0_6px_20px_rgba(245,158,11,0.23)] hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 transition-all duration-200";

            document.getElementById('btn-cancelar').classList.remove('hidden');
            document.getElementById('btn-delete').classList.remove('hidden'); // Mostrar botón eliminar
            
            // Auto scroll hacia el formulario (muy útil en móviles)
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.querySelector('.w-full.lg\\:w-1\\/3').scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- FUNCIÓN PARA ELIMINAR EVENTO ---
        function confirmarEliminar() {
            Swal.fire({
                title: '¿Estás seguro?',
                text: "Esta acción eliminará el evento, pero quedará un registro en auditoría.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar',
                customClass: { popup: 'rounded-2xl w-[95%] max-w-sm' }
            }).then((result) => {
                if (result.isConfirmed) {
                    
                    Swal.fire({ title: 'Eliminando...', text: 'Actualizando base de datos', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

                    const form = document.getElementById('eventoForm');
                    const data = new URLSearchParams(new FormData(form));
                    data.set('action', 'delete'); // Sobrescribir la acción a 'delete'

                    fetch(APPS_SCRIPT_URL, { method: 'POST', body: data })
                        .then(res => res.json())
                        .then(result => {
                            Swal.fire({
                                icon: 'success',
                                title: '¡Eliminado!',
                                text: 'El evento ha sido borrado correctamente.',
                                timer: 2000,
                                showConfirmButton: false,
                                customClass: { popup: 'rounded-2xl w-[95%] max-w-sm' }
                            });
                            eventosCacheados = null; // Borrar caché para recargar
                            resetForm();
                            calendar.refetchEvents();
                        })
                        .catch(err => {
                            Swal.fire('Error', 'No se pudo eliminar el evento.', 'error');
                        });
                }
            });
        }


        document.addEventListener('DOMContentLoaded', function () {

            // Llenar comunas
            const optgroupComunas = document.getElementById('optgroup-comunas');
            for (let i = 1; i <= 22; i++) {
                let opt = document.createElement('option');
                opt.value = 'Comuna ' + i; opt.textContent = 'Comuna ' + i;
                optgroupComunas.appendChild(opt);
            }

            // --- INICIALIZAR CALENDARIO ---
            var calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                height: '100%',
                headerToolbar: { 
                    left: 'prev,next today', 
                    center: 'title', 
                    right: window.innerWidth < 640 ? 'dayGridMonth,listWeek' : 'dayGridMonth,timeGridWeek,listWeek' 
                },
                buttonText: { today: 'Hoy', month: 'Mes', week: 'Semana', list: 'Agenda' },
                windowResize: function(arg) {
                    if (window.innerWidth < 640) {
                        calendar.setOption('headerToolbar', { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listWeek' });
                    } else {
                        calendar.setOption('headerToolbar', { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,listWeek' });
                    }
                },

                // Actualizar el "Navegador de Meses" cuando cambiamos la vista del calendario
                datesSet: function (info) {
                    const viewDate = info.view.currentStart;
                    const mesFormateado = `${viewDate.getFullYear()}-${String(viewDate.getMonth() + 1).padStart(2, '0')}`;
                    document.getElementById('mesNavegador').value = mesFormateado;
                },

                // Cargar datos (Utiliza caché para no hacer esperar al usuario)
                eventSources: [
                    {
                        events: function (fetchInfo, successCallback, failureCallback) {
                            if (eventosCacheados) {
                                successCallback(eventosCacheados);
                                return;
                            }

                            Swal.fire({ title: 'Sincronizando...', text: 'Obteniendo datos', allowOutsideClick: false, showConfirmButton: false, didOpen: () => { Swal.showLoading() }, customClass: { popup: 'rounded-2xl w-[90%] max-w-sm' } });
                            
                            // Usar fetch para manejar posibles redirecciones de Google
                            fetch(APPS_SCRIPT_URL)
                                .then(response => {
                                    if (!response.ok) {
                                        throw new Error(`HTTP error! status: ${response.status}`);
                                    }
                                    return response.json();
                                })
                                .then(data => {
                                    eventosCacheados = data; // Guardar en caché
                                    Swal.close();
                                    successCallback(data);
                                })
                                .catch(error => { 
                                    console.error('Fetch error:', error);
                                    
                                    // Fallback: Intento mediante script tag (JSONP) si fetch directo falla por CORS
                                    let script = document.createElement('script');
                                    let callbackName = 'jsonpCallback_' + Math.round(100000 * Math.random());
                                    
                                    window[callbackName] = function(data) {
                                        delete window[callbackName];
                                        document.body.removeChild(script);
                                        eventosCacheados = data;
                                        Swal.close();
                                        successCallback(data);
                                    };
                                    
                                    script.src = APPS_SCRIPT_URL + "?callback=" + callbackName;
                                    script.onerror = function() {
                                       Swal.fire({icon: 'error', title: 'Error', text: 'Conexión a Google Sheets bloqueada. Asegúrate de implementar como "Cualquier persona".', customClass: { popup: 'rounded-2xl w-[95%] max-w-sm' }});
                                       failureCallback(error);
                                    };
                                    document.body.appendChild(script);
                                });
                        }
                    },
                    {
                        // API de Festivos (También con caché por año)
                        events: async function (fetchInfo, successCallback, failureCallback) {
                            const year = fetchInfo.start.getFullYear();
                            if (festivosCacheados[year]) {
                                successCallback(festivosCacheados[year]);
                                return;
                            }
                            try {
                                const response = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/CO`);
                                const data = await response.json();
                                const holidays = data.map(h => ({
                                    title: h.localName,
                                    start: h.date,
                                    allDay: true,
                                    extendedProps: { isHoliday: true }
                                }));
                                festivosCacheados[year] = holidays; // Guardar en caché
                                successCallback(holidays);
                            } catch (e) {
                                successCallback([]);
                            }
                        }
                    }
                ],

                // DISEÑO UX: Renderizar los cuadritos del calendario con los colores solicitados
                eventContent: function (arg) {
                    const props = arg.event.extendedProps;

                    // 1. Diseño especial para los Días Festivos
                    if (props.isHoliday) {
                        let divEl = document.createElement('div');
                        divEl.className = 'w-full p-1 bg-rose-50/80 border border-rose-200 text-rose-700 rounded-lg overflow-hidden text-center cursor-default shadow-sm';
                        divEl.innerHTML = `
                            <div class="text-[9px] font-extrabold uppercase tracking-widest text-rose-500 mb-0.5 opacity-90">🎉 Festivo</div>
                            <div class="text-xs font-bold leading-tight truncate px-1 pb-0.5" title="${arg.event.title}">${arg.event.title}</div>
                        `;
                        return { domNodes: [divEl] };
                    }

                    // 2. Diseño para las programaciones con colores personalizados por grupo
                    let bgClass = 'bg-slate-100 border-slate-300 text-slate-700';
                    let dotClass = 'bg-slate-400';

                    if (props.grupo === 'Salud Pública') {
                        bgClass = 'bg-blue-50 border-blue-200 text-blue-800'; dotClass = 'bg-blue-500'; // Azul
                    } else if (props.grupo === 'Ambiente y Salud') {
                        bgClass = 'bg-emerald-50 border-emerald-200 text-emerald-800'; dotClass = 'bg-emerald-500'; // Verde
                    } else if (props.grupo === 'Vigilancia') {
                        bgClass = 'bg-purple-50 border-purple-200 text-purple-800'; dotClass = 'bg-purple-500'; // Morado
                    } else if (props.grupo === 'Regulación Sanitaria' || props.grupo === 'Regulación y Control') {
                        bgClass = 'bg-orange-50 border-orange-200 text-orange-800'; dotClass = 'bg-orange-500'; // Naranja
                    }

                    let divEl = document.createElement('div');
                    divEl.className = `evento-personalizado w-full p-1 sm:p-1.5 border rounded-lg overflow-hidden flex flex-col justify-start ${bgClass}`;
                    divEl.innerHTML = `
                        <div class="flex items-center gap-1.5 mb-0.5">
                            <span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full shadow-sm ${dotClass} shrink-0"></span>
                            <span class="text-[9px] sm:text-[10px] font-bold tracking-wide opacity-90 truncate">${arg.timeText}</span>
                        </div>
                        <div class="text-[10px] sm:text-xs font-semibold leading-tight truncate px-0.5">${arg.event.title}</div>
                    `;
                    return { domNodes: [divEl] };
                },

                // DISEÑO UX: El Modal Elegante al hacer clic
                eventClick: function (info) {
                    const props = info.event.extendedProps;
                    if (props.isHoliday) return;

                    const fechaObj = info.event.start;
                    const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                    const fechaFomateada = fechaObj.toLocaleDateString('es-CO', opcionesFecha);

                    // Pequeño script visual para que el banner del modal herede el color
                    let colorGrupoClass = 'bg-slate-50 text-slate-800 border-slate-200';
                    let textGrupoClass = 'text-slate-600';
                    if (props.grupo === 'Salud Pública') { colorGrupoClass = 'bg-blue-50/80 text-blue-800 border-blue-100'; textGrupoClass = 'text-blue-600'; }
                    else if (props.grupo === 'Ambiente y Salud') { colorGrupoClass = 'bg-emerald-50/80 text-emerald-800 border-emerald-100'; textGrupoClass = 'text-emerald-600'; }
                    else if (props.grupo === 'Vigilancia') { colorGrupoClass = 'bg-purple-50/80 text-purple-800 border-purple-100'; textGrupoClass = 'text-purple-600'; }
                    else if (props.grupo === 'Regulación Sanitaria' || props.grupo === 'Regulación y Control') { colorGrupoClass = 'bg-orange-50/80 text-orange-800 border-orange-100'; textGrupoClass = 'text-orange-600'; }

                    const htmlModal = `
                        <div class="text-left mt-2 space-y-3 sm:space-y-4">
                            <!-- Banner de Fecha Dinámico -->
                            <div class="${colorGrupoClass} p-3 sm:p-3.5 rounded-xl border flex items-center gap-3">
                                <div class="bg-white p-1.5 rounded-lg shadow-sm shrink-0 ${textGrupoClass}"><svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></div>
                                <span class="font-bold text-xs sm:text-sm capitalize leading-tight">${fechaFomateada}</span>
                            </div>

                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
                                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200/60">
                                    <span class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Estrategia</span>
                                    <span class="font-bold text-slate-800 block">${props.grupo === 'Regulación y Control' ? 'Regulación Sanitaria' : props.grupo}</span>
                                    ${props.subgrupo && props.subgrupo !== 'N/A' ? `<span class="block text-xs font-medium text-slate-500 mt-0.5 leading-tight">${props.subgrupo}</span>` : ''}
                                </div>
                                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200/60">
                                    <span class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Ubicación</span>
                                    <span class="font-bold text-slate-800 line-clamp-1 block" title="${props.barrio}">${props.barrio}</span>
                                    <span class="block text-xs font-medium text-slate-500 mt-0.5 leading-tight line-clamp-1">${props.direccion} (${props.comuna})</span>
                                </div>
                            </div>

                            <div class="bg-slate-50 p-3 rounded-xl border border-slate-200/60">
                                <span class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Población Objeto</span>
                                <span class="text-sm font-bold text-slate-700 block">${props.poblacion}</span>
                            </div>

                            <div class="bg-slate-50 p-3 rounded-xl border border-slate-200/60">
                                <span class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Servicios Ofertados</span>
                                <p class="text-sm text-slate-700 font-medium whitespace-pre-wrap leading-relaxed">${props.servicios}</p>
                            </div>

                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
                                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200/60">
                                    <span class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Responsable</span>
                                    <span class="font-bold text-slate-800 flex items-center gap-1.5"><svg class="w-4 h-4 text-slate-400 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg> <span class="truncate">${props.responsable}</span></span>
                                </div>
                                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200/60">
                                    <span class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Articulación</span>
                                    <span class="font-bold text-slate-800 block">${props.articulacion || '<span class="text-slate-400 italic font-normal">Ninguna</span>'}</span>
                                </div>
                            </div>
                        </div>
                    `;

                    Swal.fire({
                        title: `<div class="text-lg sm:text-2xl font-extrabold text-slate-800 text-left tracking-tight border-b border-slate-100 pb-2 sm:pb-3 leading-tight">${info.event.title}</div>`,
                        html: htmlModal,
                        showCloseButton: true,
                        showCancelButton: true,
                        focusConfirm: false,
                        confirmButtonText: `
                            <svg class="w-4 h-4 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg> 
                            Editar Evento
                        `,
                        cancelButtonText: 'Cerrar',
                        customClass: {
                            title: 'mb-0',
                            confirmButton: 'w-full sm:w-auto bg-amber-500 hover:bg-amber-600 focus:ring-4 focus:ring-amber-200 text-white font-bold rounded-xl text-sm px-5 py-3 transition-all order-2 sm:order-1',
                            cancelButton: 'w-full sm:w-auto bg-white border-2 border-slate-200 text-slate-600 hover:bg-slate-50 hover:text-slate-800 font-bold rounded-xl text-sm px-5 py-2.5 transition-all order-1 sm:order-2 mb-2 sm:mb-0',
                            actions: 'flex flex-col sm:flex-row gap-2 sm:gap-3 w-full justify-end mt-4 sm:mt-6 border-t border-slate-100 pt-4'
                        }
                    }).then((result) => {
                        if (result.isConfirmed) { cargarEventoEnFormulario(info.event); }
                    });
                }
            });
            calendar.render();

            // --- NAVEGADOR DE MESES PERSONALIZADO ---
            document.getElementById('mesNavegador').addEventListener('change', function (e) {
                if (e.target.value) {
                    calendar.gotoDate(e.target.value + '-01'); // Salta directamente al mes elegido
                }
            });

            // --- PROCESAR FORMULARIO (CREAR O ACTUALIZAR) ---
            const form = document.getElementById('eventoForm');
            form.addEventListener('submit', function (e) {
                e.preventDefault();

                Swal.fire({ title: 'Guardando...', text: 'Sincronizando con la base de datos', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }, customClass: { popup: 'rounded-2xl w-[95%] max-w-sm' } });

                const data = new URLSearchParams(new FormData(form));

                fetch(APPS_SCRIPT_URL, { method: 'POST', body: data })
                    .then(res => res.json())
                    .then(result => {
                        const isUpdate = document.getElementById('action').value === 'update';
                        Swal.fire({
                            icon: 'success',
                            title: isUpdate ? '¡Actualizado!' : '¡Registrado!',
                            text: isUpdate ? 'El evento ha sido modificado.' : 'El evento ha sido guardado.',
                            timer: 2000,
                            showConfirmButton: false,
                            customClass: { popup: 'rounded-2xl w-[95%] max-w-sm' }
                        });

                        eventosCacheados = null; // BORRAR CACHÉ para forzar descarga nueva
                        resetForm();
                        calendar.refetchEvents(); // Recargar el calendario con los datos frescos
                        
                        // Si estábamos en móvil y editando, volvemos a bajar al calendario suavemente tras guardar
                        if(window.innerWidth < 1024) {
                            setTimeout(() => { document.getElementById('calendar').scrollIntoView({ behavior: 'smooth' }); }, 1500);
                        }
                    })
                    .catch(err => {
                        Swal.fire({icon: 'error', title: 'Error', text: 'Hubo un problema de conexión al guardar.', customClass: { popup: 'rounded-2xl w-[95%] max-w-sm' }});
                    });
            });
        });
    </script>
</body>

</html>
